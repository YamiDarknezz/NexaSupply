services:
  db:
    image: postgres:16-alpine
    container_name: nexasupply-db
    environment:
      POSTGRES_DB: nexasupply
      POSTGRES_USER: nexasupply
      POSTGRES_PASSWORD: nexasupply123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexasupply -d nexasupply"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
